name: Build windows

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4
      - name: Install cygwin
        uses: cygwin/cygwin-install-action@master
        with:
          packages: libtool,autoconf,automake,make,binutils,filesystem,e2fsprogs,gcc,libewf,libjpeg-turbo,ntfsprogs,ncurses,libncurses-devel,libiconv,zlib,pkg-config
      - shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd ${GITHUB_WORKSPACE}
          chmod +x autogen.sh
          ./autogen.sh
      - shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd ${GITHUB_WORKSPACE}
          chmod +x compile.sh
          ./compile.sh
