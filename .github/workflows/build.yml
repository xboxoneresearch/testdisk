name: Build windows

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@v4
      - name: Install cygwin
        uses: cygwin/cygwin-install-action@master
        with:
          packages: libtool,autoconf,automake,make,binutils,filesystem,e2fsprogs,gcc,libewf,libjpeg-turbo,ntfsprogs,ncurses,libncurses-devel,libiconv,zlib,pkg-config
      - name: Autogen
        run: bash autogen.sh
      - name: Compile
        run: bash compile.sh x86_64-pc-cygwin
